<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面试追问模拟器 — 宁渡 Mind</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #eef1f6;
  color: #2c3e50;
  line-height: 1.6;
  min-height: 100vh;
}

.header {
  position: sticky; top: 0; z-index: 100;
  background: #1a1a2e; color: #fff;
  padding: 16px 32px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.5px; }
.header .subtitle { font-size: 0.85rem; color: #8e99b0; margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 16px; }
.btn-reset {
  background: rgba(255,255,255,0.1); color: #ccc; border: 1px solid rgba(255,255,255,0.2);
  padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
  transition: all 0.2s;
}
.btn-reset:hover { background: rgba(255,255,255,0.2); color: #fff; }

.main-layout {
  display: flex;
  max-width: 1100px; margin: 0 auto;
  padding: 24px 32px 60px;
  gap: 24px;
  position: relative;
}

#trees-container {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; gap: 28px;
}

.tree-root { display: flex; flex-direction: column; }

.node {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.node:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }

.node-header {
  display: flex; align-items: center;
  padding: 12px 16px;
  cursor: pointer; user-select: none;
  gap: 10px;
  border-left: 4px solid transparent;
  transition: background 0.15s;
}
.node-header:hover { filter: brightness(0.97); }

.toggle-icon {
  font-size: 0.7rem; width: 18px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: #7c8aa0; transition: transform 0.2s;
}
.toggle-icon.expanded { transform: rotate(90deg); }

.question {
  flex: 1; font-weight: 600; font-size: 0.95rem;
  color: #1a1a2e; line-height: 1.5;
}

.delete-btn {
  flex-shrink: 0;
  background: none; border: 1px solid transparent;
  font-size: 0.8rem; cursor: pointer;
  padding: 4px 10px; border-radius: 5px;
  color: #c0392b; opacity: 0.6;
  transition: all 0.15s;
  white-space: nowrap;
}
.delete-btn:hover { opacity: 1; background: #fdecea; border-color: #e8b4b4; }
.delete-btn.root-delete { opacity: 0.25; cursor: not-allowed; color: #999; }
.delete-btn.root-delete:hover { background: none; border-color: transparent; opacity: 0.25; }

.node-body {
  padding: 0 16px 14px 44px;
  display: none;
}
.node.expanded > .node-body { display: block; }
.node-root > .node-body { display: block; }

.answer {
  background: rgba(255,255,255,0.7);
  padding: 10px 14px; border-radius: 6px;
  font-size: 0.88rem; line-height: 1.7;
  color: #3a4a5c; margin-bottom: 8px;
  border-left: 3px solid #5b8def;
}

.tags {
  display: flex; flex-wrap: wrap; gap: 6px;
  font-size: 0.75rem; color: #5b7fab;
}

.tag {
  background: rgba(91,141,239,0.1); color: #4a6fbf;
  padding: 2px 10px; border-radius: 12px;
  font-weight: 500;
  border: 1px solid rgba(91,141,239,0.2);
}

.children-container {
  display: none;
  padding-left: 24px;
  border-left: 2px solid #dde4f0;
  margin-left: 24px;
}
.node.expanded > .children-container,
.node-root > .children-container { display: block; }

.children-empty {
  padding: 8px 0; font-size: 0.8rem; color: #aab5c4;
  font-style: italic;
}

.depth-0 > .node-header { background: #e8effa; }
.depth-1 > .node-header { background: #f0f4ff; }
.depth-2 > .node-header { background: #f5f8ff; }
.depth-3 > .node-header { background: #f8faff; }
.depth-4 > .node-header { background: #fafcff; }
.depth-5 > .node-header { background: #fcfdfe; }

.tree-root > .node { border: 2px solid #d0daf0; }
.tree-root > .node > .node-header { border-left-color: #5b8def; }

#recycle-panel {
  position: fixed; right: 0; top: 0; bottom: 0;
  width: 340px; background: #fff;
  box-shadow: -4px 0 20px rgba(0,0,0,0.12);
  z-index: 200;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex; flex-direction: column;
}
#recycle-panel.open { transform: translateX(0); }

.recycle-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.25);
  z-index: 199; display: none;
}
.recycle-overlay.show { display: block; }

.recycle-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 20px 16px; border-bottom: 1px solid #eef1f6;
  flex-shrink: 0;
}
.recycle-header h3 { font-size: 1.1rem; color: #1a1a2e; }
.recycle-header .count { color: #7c8aa0; font-weight: normal; font-size: 0.9rem; margin-left: 6px; }
.recycle-close {
  background: none; border: none; font-size: 1.3rem; cursor: pointer;
  color: #999; padding: 4px 8px; border-radius: 4px;
}
.recycle-close:hover { background: #f0f2f5; color: #333; }

.recycle-list { flex: 1; overflow-y: auto; padding: 12px 20px; }

.recycle-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px; border-radius: 8px; margin-bottom: 8px;
  background: #f9fafb; border: 1px solid #eef1f6;
  transition: all 0.15s;
}
.recycle-item:hover { background: #f0f4ff; border-color: #d0daf0; }
.recycle-item-info { flex: 1; min-width: 0; }
.recycle-item-question {
  font-weight: 600; font-size: 0.85rem; color: #2c3e50;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.recycle-item-path {
  font-size: 0.72rem; color: #8e99b0; margin-top: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.recycle-restore-btn {
  flex-shrink: 0;
  background: #5b8def; color: #fff; border: none;
  font-size: 0.8rem; cursor: pointer;
  padding: 5px 14px; border-radius: 6px;
  transition: background 0.15s;
}
.recycle-restore-btn:hover { background: #4a7adf; }

.recycle-empty {
  text-align: center; color: #bcc5d4; padding: 60px 20px;
  font-size: 0.9rem;
}

#bin-trigger {
  position: fixed; right: 0; top: 50%; transform: translateY(-50%);
  z-index: 198;
  background: #1a1a2e; color: #fff; border: none;
  padding: 16px 10px; border-radius: 8px 0 0 8px;
  cursor: pointer; font-size: 1rem;
  writing-mode: vertical-rl; letter-spacing: 3px;
  box-shadow: -3px 0 14px rgba(0,0,0,0.15);
  transition: all 0.25s;
}
#bin-trigger:hover { background: #2c3e6e; padding-right: 14px; }
#bin-trigger.has-items { background: #5b8def; }
#bin-trigger .badge {
  display: inline-block; background: #e74c3c; color: #fff;
  font-size: 0.65rem; border-radius: 10px;
  padding: 1px 7px; margin-left: 2px;
  writing-mode: horizontal-tb;
}

.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: #1a1a2e; color: #fff; padding: 10px 24px;
  border-radius: 8px; font-size: 0.9rem; z-index: 999;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.toast.show { opacity: 1; }
.toast.warn { background: #e67e22; }
.toast.error { background: #c0392b; }

@media (max-width: 768px) {
  .main-layout { padding: 16px 12px 60px; }
  .header { padding: 12px 16px; }
  .header h1 { font-size: 1.1rem; }
  .children-container { margin-left: 12px; padding-left: 14px; }
  .node-body { padding: 0 10px 12px 30px; }
  .node-header { padding: 10px 12px; }
  #recycle-panel { width: 100%; max-width: 340px; }
}
</style>
</head>

<div class="header">
  <div>
    <h1>&#x1f3af; 面试追问模拟器 — 宁渡 Mind</h1>
    <div class="subtitle">基于 AI 心理健康服务平台全栈项目的面试深挖训练</div>
  </div>
  <div class="header-right">
    <button class="btn-reset" onclick="resetAll()" title="恢复默认数据">&#x1f504; 重置数据</button>
  </div>
</div>

<div class="main-layout">
  <div id="trees-container"></div>
</div>

<div class="recycle-overlay" id="recycle-overlay" onclick="closeRecycleBin()"></div>

<div id="recycle-panel">
  <div class="recycle-header">
    <h3>&#x1f4e5; 回收站<span class="count" id="bin-count"></span></h3>
    <button class="recycle-close" onclick="closeRecycleBin()">&#x2715;</button>
  </div>
  <div class="recycle-list" id="recycle-list">
    <div class="recycle-empty">&#x1f4ed; 暂无已删除的问题</div>

</div>

<button id="bin-trigger" onclick="toggleRecycleBin()">&#x1f4e5; 回收站</button>

<div class="toast" id="toast"></div>

<script>
var STORAGE_KEY = 'interviewTreeData';
var DATA_VERSION = '1.0';
var isOperating = false;
var treeData = null;

function generateId() {
  return 'node_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
}

function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || '');
  el.classList.add('show');
  clearTimeout(el._timeout);
  el._timeout = setTimeout(function() { el.classList.remove('show'); }, 2200);
}

function getDefaultData() {
  return {"version":"1.0","trees":[
    {"id":"root-1","question":"\u2753 请先做一个自我介绍，然后介绍一下你的项目、项目中的难点以及项目亮点。","answer":"我叫杨逸航，南京邮电大学软件工程大三学生。我做的项目叫\u201c宁渡 Mind\u201d，是一个 AI 心理健康服务平台。前端用 Vue 3 + TypeScript + Element Plus，后端 Spring Boot 3 + MyBatis-Plus，AI 引擎用 Python FastAPI + LangChain 调用 DeepSeek 大模型。核心功能包括 AI 实时心理咨询（SSE 流式响应）、情绪日记记录与 AI 分析、心理健康知识库，还有管理端 ECharts 数据可视化仪表盘。技术难点有两块：一是三层流式对话管道设计，LLM 输出 NDJSON \u2192 WebFlux 解析 \u2192 SSE 推前端，三层解耦各层独立可替换；二是 RAG 检索增强生成，BeautifulSoup 清洗文章 + Sentence-Transformers 向量化 + FAISS 索引，对话时语义检索 Top-K 片段注入 Prompt。亮点方面：AI 引擎通过 ChatAgent 接口 + 策略模式实现 Mock/Real 双模可插拔切换，业务代码零感知；Prompt Engineering 约束 LLM 输出结构化 JSON，实现情绪量化评分和四级风险预警。后端 128 个测试用例覆盖全部模块。","tags":["\u4e2a\u4eba\u4ecb\u7ecd","\u9879\u76ee\u6838\u5fc3","\u96be\u70b9\u89e3\u51b3","\u4eae\u70b9\u5448\u73b0"],"parentId":null,"order":0,"children":[
      {"id":"root-1-1","question":"\u2753 三层流式对话管道具体怎么设计的？NDJSON \u2192 WebFlux \u2192 SSE 的协议转换细节能展开讲讲吗？","answer":"LLM 返回的是 NDJSON，每行一个 JSON 对象包含 delta 内容。Python Agent 直接透传，Java 端用 WebFlux 的 WebClient 以流式方式读取响应体，按行分割后用 Jackson 解析每个 JSON 对象，提取 delta 字段，再封装成 SSE 格式通过 SseEmitter.send() 推给前端。前端用 @microsoft/fetch-event-source 库接收 SSE 事件，逐字符追加到消息列表。三段协议各层独立，换 LLM 只需改 Agent 层，换后端推送方式只需改 WebFlux 层。","tags":["\u6d41\u5f0f\u5bf9\u8bdd","\u534f\u8bae\u8f6c\u6362","SSE"],"parentId":"root-1","order":0,"children":[
        {"id":"root-1-1-1","question":"\u2753 WebFlux 怎么把 NDJSON 逐行解析并转成 SSE 的？用的是 SseEmitter 还是 Flux？","answer":"用的是 Spring MVC 的 SseEmitter，不是 WebFlux 的 Flux。因为项目主体是 Spring MVC，只在调用 Agent 时用 WebFlux 的 WebClient 做非阻塞 HTTP 请求。WebClient 返回 Flux<DataBuffer>，我用 Jackson 的 JsonParser 逐行解析，每读到完整一行就通过 SseEmitter.send() 推给前端。SseEmitter 的超时设了 5 分钟，防止长对话断连。","tags":["SseEmitter","WebClient","\u975e\u963b\u585e"],"parentId":"root-1-1","order":0,"children":[
          {"id":"root-1-1-1-1","question":"\u2753 如果中间某一层挂了（比如 Agent 超时或返回格式异常），你怎么保证整个链路不崩溃？超时和重试机制是什么？","answer":"Agent 调用设置了 30 秒超时，超时后 WebClient 会抛 TimeoutException，我在 Service 层 catch 后通过 SseEmitter.completeWithError() 通知前端，前端显示\u201cAI 响应超时，请重试\u201d。如果 NDJSON 某行解析失败，不会中断整个流，而是跳过该行记录日志继续处理下一行。目前没有自动重试，因为对话场景下重试可能产生重复内容，交给用户手动重新发送更合理。极端情况整个链路崩溃，Spring Boot 的全局异常处理器会兜底返回统一错误响应。","tags":["\u8d85\u65f6\u5904\u7406","\u5bb9\u9519","\u5f02\u5e38\u515c\u5e95"],"parentId":"root-1-1-1","order":0,"children":[]}
        ]}
      ]},
      {"id":"root-1-2","question":"\u2753 RAG 检索增强生成是怎么实现的？向量化的完整流程讲一下。","answer":"首先在管理端创建/编辑文章时，BeautifulSoup 提取纯文本去除 HTML 标签，然后用滑动窗口分块（窗口 512 字符，重叠 128 字符）保证语义连贯。分块后通过 Sentence-Transformers 的 paraphrase-multilingual-MiniLM-L12-v2 模型将每个块向量化为 384 维向量，存入 FAISS 的 IndexFlatIP 索引（内积相似度）。用户提问时同样向量化后检索 Top-3 最相关片段，拼接到 System Prompt 中作为参考知识。整个流程在 Python Agent 端完成。","tags":["RAG","\u5411\u91cf\u5316","FAISS"],"parentId":"root-1","order":1,"children":[
        {"id":"root-1-2-1","question":"\u2753 滑动窗口分块的窗口大小和重叠率怎么定的？有没有对比过不同参数？","answer":"窗口 512 字符、重叠 128 字符（25% 重叠率）是参考 LangChain 的 RecursiveCharacterTextSplitter 默认值，针对中文心理学科普文章测试过。512 保证每块包含完整段落语义，128 重叠避免切断关键句子。试过 256/64 和 1024/256，前者块太碎检索精度下降，后者块太大 Top-3 可能漏掉细节。没做严格的消融实验，但从实际对话效果看 512/128 足够。","tags":["\u6587\u672c\u5206\u5757","\u53c2\u6570\u8c03\u4f18"],"parentId":"root-1-2","order":0,"children":[]},
        {"id":"root-1-2-2","question":"\u2753 FAISS 索引类型为什么选 IndexFlatIP？对比过其他索引或向量数据库（如 Milvus）吗？","answer":"选 IndexFlatIP 因为知识库数据量不大（几百篇文章），暴力搜索完全够用，不需要近似索引（IVF/HNSW）。内积相似度对归一化后向量等价于余弦相似度，效果一致。没选 Milvus 是因为对个人项目太重了\u2014\u2014需要额外部署服务、维护持久化，而 FAISS 是进程内内存索引，Python 里直接 import 就能用，零运维成本。但如果数据量上到十万级，IndexFlatIP 会变慢，届时可以切到 IndexIVFFlat 并做增量更新。","tags":["FAISS","\u5411\u91cf\u6570\u636e\u5e93","\u6280\u672f\u9009\u578b"],"parentId":"root-1-2","order":1,"children":[
          {"id":"root-1-2-2-1","question":"\u2753 知识库文章更新或删除后，FAISS 索引怎么同步？有没有增量更新策略？","answer":"目前是重建策略：文章增删改后触发全量重建索引。因为数据量小，重建一次不到 1 秒。增量更新在 FAISS 里比较麻烦\u2014\u2014IndexFlatIP 不支持删除单条向量，需要用 IndexIDMap 包装并维护 ID 映射。短期够用就先没做，如果以后数据量大了一定会改。另外索引只在 Agent 内存中，服务重启会丢失，所以启动时从数据库全量重建，这也是为什么数据量大了必须有持久化方案。","tags":["\u7d22\u5f15\u540c\u6b65","\u589e\u91cf\u66f4\u65b0"],"parentId":"root-1-2-2","order":0,"children":[]}
        ]}
      ]},
      {"id":"root-1-3","question":"\u2753 ChatAgent 接口 + 策略模式实现可插拔架构，具体怎么设计的？Mock 和 Real 怎么切换？","answer":"定义了一个 ChatAgent 接口，包含 chatStream() 和 analyzeEmotion() 等方法。RealChatAgent 实现类通过 WebFlux 调用 Python Agent；MockChatAgent 返回预设的静态响应。在 Spring Boot 配置类中，通过 @ConditionalOnProperty 读取配置文件里的 agent.mode 值：设为 \"real\" 注入 RealChatAgent，设为 \"mock\" 注入 MockChatAgent。业务层只依赖 ChatAgent 接口，完全不知道底层是 mock 还是 real。开发前端时不需要启动 Python Agent 和 DeepSeek API，切到 mock 模式就能独立调试。","tags":["\u7b56\u7565\u6a21\u5f0f","\u63a5\u53e3\u62bd\u8c61","\u53ef\u63d2\u62d4"],"parentId":"root-1","order":2,"children":[
        {"id":"root-1-3-1","question":"\u2753 如果以后要接入另一个 LLM（比如通义千问），需要改多少代码？","answer":"改动集中在 Agent 端。在 Python 侧基于 LangChain 的 BaseChatModel 接口再抽象一层，新增通义千问的 Adapter 并在配置中指定模型名即可切换。Java 侧 ChatAgent 接口不变，因为协议统一（NDJSON 流式），RealChatAgent 不需要任何改动。前端更是零改动。这就是三层解耦的好处：换 LLM 只影响 Agent 层。","tags":["\u6269\u5c55\u6027","\u6a21\u578b\u5207\u6362"],"parentId":"root-1-3","order":0,"children":[]}
      ]},
      {"id":"root-1-4","question":"\u2753 Prompt Engineering 驱动的情感计算，怎么约束 LLM 输出结构化 JSON？出现幻觉怎么办？","answer":"在 System Prompt 中明确要求 LLM 按指定 JSON Schema 输出，并在 User Message 末尾加\u201c请严格按 JSON 格式返回，不要包含任何其他内容\u201d。同时在后端做了两层防护：第一层用 Python 的 json.loads() 解析，如果失败就用正则提取第一个 { } 块再试；第二层如果还是失败，返回一个默认的安全评分结构（中性情绪、无风险），保证不阻塞用户对话。DeepSeek 对 JSON 输出的遵从度还不错，实测成功率 95% 以上。","tags":["Prompt\u5de5\u7a0b","\u7ed3\u6784\u5316\u8f93\u51fa","\u5bb9\u9519"],"parentId":"root-1","order":3,"children":[
        {"id":"root-1-4-1","question":"\u2753 四级风险预警是哪四级？每一级的阈值和处理策略分别是什么？","answer":"四级分别是：正常（score 0-3）、轻度（4-5）、中度（6-7）、高危（8-10）。正常和轻度只记录不做干预；中度在对话中温和建议寻求专业帮助；高危立即触发干预话术，如\u201c我注意到你可能正在经历一些困难，建议联系学校心理咨询中心或拨打心理援助热线\u201d。这些策略都写在 System Prompt 中，LLM 根据情绪评分自动选择对应的干预模板。目前只是对话层面的提示，不涉及真实报警或通知。","tags":["\u98ce\u9669\u9884\u8b66","\u56db\u7ea7\u5206\u7c7b","\u5e72\u9884\u7b56\u7565"],"parentId":"root-1-4","order":0,"children":[
          {"id":"root-1-4-1-1","question":"\u2753 评分解析失败时的降级默认值是\u201c中性情绪、无风险\u201d，万一用户真的处于高危状态，这个降级会不会导致漏报？","answer":"确实存在这个风险，这是当前设计的一个妥协。权衡在于：如果解析失败就假设高危，误报率会极高，用户频繁被\u201c警告\u201d反而降低信任感。目前的做法是：解析失败时记录日志、降级为中性但不影响对话继续，同时把原始 LLM 输出完整保存，后续可以离线分析。更好的方案是加一个独立的风险检测模型做第二道防线，和 LLM 的情感分析结果交叉验证\u2014\u2014这是我后续想优化的方向。","tags":["\u964d\u7ea7\u7b56\u7565","\u6f0f\u62a5\u98ce\u9669","\u6539\u8fdb\u65b9\u5411"],"parentId":"root-1-4-1","order":0,"children":[]}
        ]}
      ]}
    ]},
    {"id":"root-2","question":"\u2753 围绕项目的前端部分，面试官可能会问哪些问题？","answer":"前端用 Vue 3 + TypeScript + Vite 8，UI 库 Element Plus，状态管理 Pinia，图表 ECharts 6，SSE 流式用 @microsoft/fetch-event-source。常见追问方向：Pinia Store 的划分和跨 Store 通信、SSE 流式消息的接收渲染与性能优化、组件通信方式选择、路由守卫权限控制、ECharts 封装、打包优化等。下面逐一展开。","tags":["\u72b6\u6001\u7ba1\u7406","SSE\u6d41\u5f0f","\u7ec4\u4ef6\u901a\u4fe1","\u6027\u80fd\u4f18\u5316"],"parentId":null,"order":1,"children":[
      {"id":"root-2-1","question":"\u2753 Pinia 状态管理你是怎么划分 Store 的？用户、对话、UI 状态怎么隔离？","answer":"分了三个 Store：userStore 管理登录态和用户信息；chatStore 管理当前会话列表、消息历史和 SSE 连接状态；appStore 管理 UI 层面的全局状态（侧边栏折叠、加载状态等）。职责明确不交叉。userStore 登录成功后 chatStore 会自动重新加载会话列表，通过 chatStore 里 watch userStore 的 token 变化来实现联动。","tags":["Pinia","Store\u5212\u5206"],"parentId":"root-2","order":0,"children":[
        {"id":"root-2-1-1","question":"\u2753 用 watch 做 Store 间联动，有没有遇到过循环触发的坑？怎么解决的？","answer":"确实遇到过。比如 userStore.token 变化触发 chatStore 重新加载\u2192加载完成后更新 chatStore 的某个状态\u2192又触发了 appStore 的 watch\u2192appStore 又触发回 userStore，形成循环。解决方法：watch 里加条件判断，只有值真正变化了才执行逻辑；同时把\u201c加载中\u201d的标志位设为 true 时跳过 watch 回调。另外大部分联动改成在具体的 action 里显式调用另一个 store 的方法，而不是依赖隐式的 watch，逻辑更可控。","tags":["\u5faa\u73af\u89e6\u53d1","Store\u8054\u52a8"],"parentId":"root-2-1","order":0,"children":[]}
      ]},
      {"id":"root-2-2","question":"\u2753 SSE 流式对话在前端怎么接收和渲染的？为什么用 @microsoft/fetch-event-source 而不是原生 EventSource？","answer":"原生 EventSource 只支持 GET 请求，无法携带 Authorization Header 做 JWT 鉴权。@microsoft/fetch-event-source 基于 fetch API，支持 POST 请求和自定义 Header，还能处理断线重连。前端发起 POST 请求到 /psychological-chat/stream，携带会话 ID 和用户消息，后端返回 SSE 流。收到 onmessage 回调后，把 delta 追加到当前消息的 content 字段，Vue 响应式自动更新 DOM。","tags":["SSE","fetch-event-source"],"parentId":"root-2","order":1,"children":[
        {"id":"root-2-2-1","question":"\u2753 流式渲染时 DOM 频繁更新，性能怎么优化？长对话会卡吗？","answer":"每条消息的内容是累积拼接的\u2014\u2014每次 onmessage 拿到新 delta 就拼到响应式字符串后面。Vue 的 diff 算法会只更新变化的部分，单个消息的文本节点更新很快。但确实如果单条消息特别长（几千字），频繁更新会有轻微卡顿。我用了一个简单的节流：累积 10 个 delta 或超过 50ms 才更新一次响应式变量。对于长对话历史（多轮消息），每条消息是独立 DOM 节点，不会频繁重建。目前没上虚拟滚动，因为单会话消息量通常不超过 100 条，性能没出过问题。","tags":["\u6027\u80fd\u4f18\u5316","\u8282\u6d41"],"parentId":"root-2-2","order":0,"children":[]}
      ]},
      {"id":"root-2-3","question":"\u2753 Vue 3 组件通信用了哪些方式？什么场景用 provide/inject，什么场景用 Pinia？","answer":"父子通信用 props + emits；爷孙跨越用 provide/inject（如聊天页面的会话 ID 注给子组件）；全局共享状态用 Pinia。判断标准：provide/inject 适合单页面内组件树共享的数据（作用域明确），Pinia 适合跨页面/跨路由的全局状态。比如当前会话 ID 只在聊天页及子组件需要，用 provide 就够了；用户登录信息多个页面都用，放 Pinia。","tags":["\u7ec4\u4ef6\u901a\u4fe1","provide/inject"],"parentId":"root-2","order":2,"children":[]},
      {"id":"root-2-4","question":"\u2753 前端路由守卫怎么处理权限的？用户端和管理端的路由怎么隔离？","answer":"Vue Router 的 beforeEach 守卫检查 Pinia userStore 里的 token 和 userType。未登录访问任何需要认证的页面统一重定向到 /login。userType=1（普通用户）访问管理端路由（/admin/*）重定向到首页；userType=2（管理员）可以访问全部路由。路由配置上就分了两组：userRoutes 和 adminRoutes，结构清晰。","tags":["\u8def\u7531\u5b88\u536b","\u6743\u9650\u63a7\u5236"],"parentId":"root-2","order":3,"children":[
        {"id":"root-2-4-1","question":"\u2753 如果用户直接在地址栏输入 /admin/dashboard，token 也没有，你拦截的整个流程是怎样的？","answer":"beforeEach 触发\u2192读取 userStore.token\u2192没有 token\u2192调用后端验证接口确认 token 是否有效（/user/verify）\u2192返回 401\u2192清除 store\u2192重定向到 /login，同时在 URL query 里带上 redirect 参数。登录成功后自动跳回原本想要的页面。如果 token 有但 userType=1，则直接重定向到 /home 并 toast 提示\u201c无权访问管理端\u201d。","tags":["\u8def\u7531\u5b88\u536b","\u91cd\u5b9a\u5411"],"parentId":"root-2-4","order":0,"children":[]}
      ]},
      {"id":"root-2-5","question":"\u2753 ECharts 6 图表组件怎么封装的？数据怎么从 Pinia 流向图表？","answer":"封装了一个 BaseChart.vue 通用组件，接收 option 和 loading 两个 props。具体图表页面（如 Dashboard）在 Pinia 里存业务数据，用 computed 把业务数据转成 ECharts option 格式，传给 BaseChart。watch option 变化时调用 chartInstance.setOption() 更新，同时做了 300ms 防抖避免频繁重绘。图表实例在 onMounted 创建，onUnmounted 销毁。","tags":["ECharts","\u7ec4\u4ef6\u5c01\u88c5"],"parentId":"root-2","order":4,"children":[]}
    ]},
    {"id":"root-3","question":"\u2753 围绕项目的后端部分，面试官可能会问哪些问题？","answer":"后端 Spring Boot 3 + MyBatis-Plus + MySQL + Redis，JWT 认证，统一异常处理，SSE 流式推送。常见追问：接口设计规范、JWT 认证链路、数据库设计、缓存策略、并发安全、测试覆盖等。","tags":["\u63a5\u53e3\u8bbe\u8ba1","JWT\u8ba4\u8bc1","\u6570\u636e\u5e93","\u7f13\u5b58\u7b56\u7565"],"parentId":null,"order":2,"children":[
      {"id":"root-3-1","question":"\u2753 RESTful 接口设计遵循什么规范？Result<T> 封装体怎么设计的？","answer":"所有接口统一返回 Result<T> 结构：code（String 类型，\"200\" 成功/\"-1\" 未登录/\"500\" 异常）、msg（提示信息）、data（泛型数据）。用 @RestControllerAdvice 统一拦截异常，业务异常抛 BusinessException，框架异常统一包装成 Result。Spring 的 ResponseEntity 泛型擦除对 Result<T> 没影响，因为实际序列化时 Jackson 根据运行时类型处理。","tags":["RESTful","\u7edf\u4e00\u54cd\u5e94"],"parentId":"root-3","order":0,"children":[
        {"id":"root-3-1-1","question":"\u2753 @RestControllerAdvice 怎么区分业务异常和系统异常？异常分类的策略是什么？","answer":"定义了 BusinessException（code=500，msg 给用户看）和 SystemException（code=500，msg 写\u201c系统繁忙\u201d，真实错误日志记录）。@ExceptionHandler 里用 instanceof 判断：BusinessException 取其 msg 返回；SystemException 和未知 Exception 返回通用提示，同时 log.error 记录堆栈。这样用户看不到敏感的内部错误信息。","tags":["\u5f02\u5e38\u5904\u7406","\u5b89\u5168"],"parentId":"root-3-1","order":0,"children":[]}
      ]},
      {"id":"root-3-2","question":"\u2753 JWT 认证流程从登录到请求拦截，完整链路讲一下。","answer":"登录时用户名密码验证通过后，用 jjwt 库生成 Token（payload 含 userId 和 userType），设置 7 天过期。前端存 localStorage，每次请求通过 Axios 拦截器自动带在 Authorization: Bearer <token> Header 上。后端 JwtInterceptor 拦截所有 /api/** 请求（除白名单），解析 Token 验证签名和过期时间，通过后把 userId 和 userType 存入 ThreadLocal，Service 层通过工具类获取当前用户。登出时前端删 Token 即可，后端无状态。","tags":["JWT","\u8ba4\u8bc1\u94fe\u8def"],"parentId":"root-3","order":1,"children":[
        {"id":"root-3-2-1","question":"\u2753 Token 过期了怎么办？有没有刷新 Token 的机制？","answer":"目前没有 refresh token 机制。前端 Axios 响应拦截器收到 code=\"-1\" 时自动跳转登录页。没做 refresh token 是因为个人项目开发周期有限，且 7 天过期对演示够用，不需要长期保持登录态。但在生产环境一定会加：用双 token（access 15 分钟 + refresh 7 天），access 过期后用 refresh 换新，refresh 过期才要求重新登录。","tags":["Token\u5237\u65b0","\u5b89\u5168\u8bbe\u8ba1"],"parentId":"root-3-2","order":0,"children":[
          {"id":"root-3-2-1-1","question":"\u2753 JWT 的密钥怎么管理的？硬编码还是配置文件？安全吗？","answer":"放在 application.yml 里，通过 @Value 注入。个人项目这样做够了，但生产环境需要放环境变量或配置中心。另外 jjwt 用的是 HMAC-SHA256 签名，密钥长度 256 位以上保证安全性。没有用非对称加密（RSA）因为单服务架构不需要分布式验证。","tags":["\u5bc6\u94a5\u7ba1\u7406","\u5b89\u5168"],"parentId":"root-3-2-1","order":0,"children":[]}
        ]}
      ]},
      {"id":"root-3-3","question":"\u2753 MyBatis-Plus 用了哪些特性？复杂查询怎么写？","answer":"分页插件、逻辑删除（@TableLogic）、自动填充（@TableField fill=INSERT_UPDATE 用于 createTime/updateTime）、代码生成器。简单 CRUD 用 BaseMapper 自带方法。复杂多表关联和聚合查询直接手写 SQL（@Select 注解或 XML），不用 QueryWrapper 硬拼，因为关联查询的可读性和性能 SQL 更好。特别的，数据分析仪表盘的聚合查询全在 SQL 层完成，充分利用 MySQL 的 GROUP BY 和聚合函数。","tags":["MyBatis-Plus","SQL\u4f18\u5316"],"parentId":"root-3","order":2,"children":[]},
      {"id":"root-3-4","question":"\u2753 Redis 在这个项目里具体缓存了什么？缓存和数据库一致性怎么保证？","answer":"主要缓存了知识库文章列表（读多写少）和用户 Session 的 token 黑名单。文章缓存用 @Cacheable 注解，过期时间 30 分钟，管理员修改文章时 @CacheEvict 清除对应缓存。一致性策略是 Cache-Aside：读的时候先查缓存，miss 则查库并回填；写的时候先更新数据库，再删缓存。没有用延迟双删，因为并发写概率低，简单删缓存足够。","tags":["Redis","\u7f13\u5b58\u4e00\u81f4\u6027"],"parentId":"root-3","order":3,"children":[
        {"id":"root-3-4-1","question":"\u2753 缓存穿透、击穿、雪崩分别怎么应对？","answer":"穿透（查不存在的数据）：布隆过滤器没加（数据量小），但业务上对不存在的文章 ID 返回空对象也缓存（短过期）。击穿（热点 key 过期）：暂时没有真正的热点 key，如果需要会用互斥锁重建缓存。雪崩（大量 key 同时过期）：给过期时间加随机偏移（\u00b15 分钟），避免集中失效。","tags":["\u7f13\u5b58\u4e09\u5927\u95ee\u9898"],"parentId":"root-3-4","order":0,"children":[
          {"id":"root-3-4-1-1","question":"\u2753 如果 Redis 挂了，整个系统还能正常运行吗？降级策略是什么？","answer":"能，Redis 在这个项目里是缓存层而非核心依赖。Redis 不可用时：@Cacheable 自动 fallback 到查数据库；Token 黑名单功能失效但不影响主流程（因为没做主动登出强制失效）。Spring Boot 配置了 Redis 连接超时 2 秒，超时后跳过缓存直接走数据库，不会阻塞请求。这是典型的\u201cgraceful degradation\u201d\u2014\u2014缓存挂了服务降级，核心功能不受影响。","tags":["\u964d\u7ea7\u7b56\u7565","\u9ad8\u53ef\u7528"],"parentId":"root-3-4-1","order":0,"children":[]}
        ]}
      ]},
      {"id":"root-3-5","question":"\u2753 并发安全怎么保证的？数据库层面有用锁吗？","answer":"Spring 默认单例 Bean 是无状态的（Controller/Service 不存成员变量），天然线程安全。用户信息通过 ThreadLocal 隔离，每次请求结束后清理防止内存泄漏。数据库层面：文章阅读量自增用 UPDATE ... SET views = views + 1（原子操作，MySQL 行锁保证），不需要额外加锁。并发量不大，没上乐观锁。","tags":["\u5e76\u53d1\u5b89\u5168","ThreadLocal"],"parentId":"root-3","order":4,"children":[]}
    ]},
    {"id":"root-4","question":"\u2753 围绕项目的 Agent/AI 相关部分，面试官可能会问哪些问题？","answer":"Agent 用 Python FastAPI，LangChain 调用 DeepSeek LLM，核心包括 Prompt 模板设计、RAG 检索流程、情感分析、流式输出。常见追问：Prompt 的约束设计、防止不安全输出、RAG 检索延迟、模型选型理由、LangChain 的价值和坑。","tags":["Prompt\u8bbe\u8ba1","RAG\u68c0\u7d22","LangChain","\u6a21\u578b\u9009\u578b"],"parentId":null,"order":3,"children":[
      {"id":"root-4-1","question":"\u2753 心理咨询场景的 System Prompt 核心要点是什么？怎么防止 LLM 输出不合适的内容？","answer":"System Prompt 有三个核心约束：1) 角色设定\u2014\u2014\u201c你是一位专业的、有同理心的心理咨询师\u201d；2) 安全边界\u2014\u2014\u201c如果用户表达自伤或伤害他人倾向，请温和引导寻求专业帮助，不要给出具体操作建议\u201d；3) 输出格式\u2014\u2014要求按 JSON Schema 返回（情绪评分、回复内容、风险等级）。Prompt 里还加了 few-shot 示例，展示理想回复风格。通过\u201c角色设定 + 安全边界 + 格式约束\u201d三层防线控制输出质量。","tags":["System Prompt","\u5b89\u5168\u7ea6\u675f"],"parentId":"root-4","order":0,"children":[
        {"id":"root-4-1-1","question":"\u2753 如果 LLM 还是输出了不安全的建议（比如用户说想自杀，LLM 给了具体方法），你有第二道防线吗？","answer":"坦白说目前没有完善的第二道防线。Prompt 里的约束依赖 LLM 遵从度，但 LLM 可能被越狱（jailbreak）。当前做法是：后端正则扫描回复内容，匹配到\u201c自杀\u201d\u201c自残\u201d\u201c跳楼\u201d等关键词时，自动替换为干预话术（\u201c请立即拨打心理援助热线...\u201d）。但这很粗糙。更好的方案是加一个独立的安全审核模型（如 OpenAI Moderation API 或本地微调的分类器）在 LLM 输出后做二次过滤\u2014\u2014这是这个项目安全方面最需要加强的地方。","tags":["\u5b89\u5168\u5ba1\u6838","\u515c\u5e95\u7b56\u7565"],"parentId":"root-4-1","order":0,"children":[]}
      ]},
      {"id":"root-4-2","question":"\u2753 RAG 检索的完整流程和延迟是多少？检索片段怎么拼到 Prompt 里？","answer":"流程：用户问题 \u2192 Sentence-Transformers 向量化（约 30ms）\u2192 FAISS 检索 Top-3（<5ms，几百条数据）\u2192 将检索片段拼到 System Prompt 的\u201c参考知识\u201d区域。整体检索延迟约 35-50ms，对对话体验几乎没有影响。拼接方式：放在 System Prompt 末尾，格式为\u201c以下是与用户问题相关的心理学知识，请参考：\n---\n{片段1}\n{片段2}\n{片段3}\n---\u201d。选 System 而非 User 消息是因为检索知识是\u201c背景信息\u201d而非\u201c用户输入\u201d，放 System 角色更符合逻辑。","tags":["RAG\u6d41\u7a0b","Prompt\u62fc\u63a5"],"parentId":"root-4","order":1,"children":[
        {"id":"root-4-2-1","question":"\u2753 Sentence-Transformers 用的是什么模型？为什么选它而不是 OpenAI Embedding？","answer":"用的 paraphrase-multilingual-MiniLM-L12-v2，384 维向量，HuggingFace 下载。选它的理由：1) 开源免费无 API 调用成本；2) 本地推理延迟低（30ms），不依赖外部服务；3) 支持中文且多语言模型对中英混合的心理学术语效果不错。没用 OpenAI Embedding 因为要额外付费 + 网络延迟。没做模型量化（FP16 已够快），384 维向量精度足够，cosine 相似度对 Top-3 检索效果没影响。","tags":["Embedding\u6a21\u578b","\u6280\u672f\u9009\u578b"],"parentId":"root-4-2","order":0,"children":[
          {"id":"root-4-2-1-1","question":"\u2753 如果知识库规模从几百篇涨到几万篇，FAISS IndexFlatIP 和 Sentence-Transformers 还撑得住吗？有什么升级路径？","answer":"Sentence-Transformers 推理延迟不变，瓶颈在 FAISS 暴力搜索。几万条 384 维向量 IndexFlatIP 约需几十毫秒，尚可接受。上十万级就需要切到 IndexIVFFlat（倒排索引 + 聚类加速），延迟可压到 10ms 内但召回率略降。百万级考虑 HNSW 图索引或直接上 Milvus/Qdrant 等专业向量数据库，支持持久化和分布式。Pipeline 本身不需要改，只需换索引实现。","tags":["\u6269\u5c55\u89c4\u5212","\u5411\u91cf\u6570\u636e\u5e93"],"parentId":"root-4-2-1","order":0,"children":[]}
        ]}
      ]},
      {"id":"root-4-3","question":"\u2753 LangChain 在这个项目里具体用了哪些组件？为什么选它而不是直接调 DeepSeek SDK？","answer":"主要用了 ChatOpenAI（兼容 DeepSeek 的 OpenAI 接口格式）、PromptTemplate、StrOutputParser。LangChain 的价值在于：统一了不同 LLM 的调用接口（换模型只需改 model_name 参数）、PromptTemplate 的变量管理和模板复用、Chain 的链式组合（Prompt \u2192 LLM \u2192 Parser）。如果直接调 SDK，这些都要手写。但 LangChain 的抽象层也确实带来了调试困难\u2014\u2014链式调用出错时堆栈很深，定位问题比直接调 SDK 麻烦。","tags":["LangChain","\u4ef7\u503c\u4e0e\u4ee3\u4ef7"],"parentId":"root-4","order":2,"children":[
        {"id":"root-4-3-1","question":"\u2753 LangChain 的过度抽象有没有给你带来过具体问题？怎么解决的？","answer":"有。比如 StrOutputParser 在某些情况下会把流式输出的 chunk 拼接逻辑搞错，导致回复重复。解决方法是自己用 Python 生成器手动处理 NDJSON 行解析，绕过 LangChain 的 Parser，只保留 ChatOpenAI 的模型调用和 PromptTemplate，其他自己写。这说明\u201c用库但不被库绑架\u201d\u2014\u2014核心逻辑自己掌控，库只做它擅长的部分。","tags":["\u8fc7\u5ea6\u62bd\u8c61","\u5b9e\u8df5\u53d6\u820d"],"parentId":"root-4-3","order":0,"children":[]}
      ]},
      {"id":"root-4-4","question":"\u2753 为什么选 DeepSeek？对比过其他模型吗？API 成本怎么控制的？","answer":"选 DeepSeek 主要是：1) 中文能力强；2) API 价格便宜（比 GPT-4 便宜几十倍）；3) 支持流式输出，NDJSON 格式规范。对比过 GPT-3.5（中文不如 DeepSeek 自然）、文心一言（API 文档和稳定性一般）。成本控制方面：System Prompt 精简短（约 200 token），RAG 片段限制 500 字以内不膨胀；单次对话平均 800 token 输入+300 token 输出，成本很低没做额外优化。若规模化会用 Prompt 缓存和语义路由。","tags":["\u6a21\u578b\u9009\u578b","\u6210\u672c\u63a7\u5236"],"parentId":"root-4","order":3,"children":[]}
    ]},
    {"id":"root-5","question":"\u2753 围绕项目的测试和质量保障，面试官可能会问哪些问题？","answer":"后端用 JUnit 5 + MockMvc + H2 内存数据库，写了 128 个测试用例覆盖用户认证、知识库 CRUD、情绪日记、SSE 流式对话、数据分析等全部模块。测试按 Controller 层组织，每个 Controller 一个测试类。","tags":["\u6d4b\u8bd5\u7b56\u7565","MockMvc","H2","\u8986\u76d6\u7387"],"parentId":null,"order":4,"children":[
      {"id":"root-5-1","question":"\u2753 128 个测试用例是怎么组织的？单元测试和集成测试的比例？","answer":"按 Controller 模块分测试类：UserControllerTest、KnowledgeControllerTest、EmotionDiaryControllerTest、ChatControllerTest、DataAnalyticsControllerTest。每个类 20-30 个用例，覆盖正常流程、边界值、异常情况、权限校验。全部是集成测试（@SpringBootTest + @AutoConfigureMockMvc），因为我们用 MockMvc 模拟 HTTP 请求走完整 Spring 链路（Controller\u2192Service\u2192Mapper\u2192H2），不是纯单元测试。我个人认为对 CRUD 为主的项目，集成测试比单元测试性价比高得多。","tags":["\u6d4b\u8bd5\u7ec4\u7ec7","\u96c6\u6210\u6d4b\u8bd5"],"parentId":"root-5","order":0,"children":[]},
      {"id":"root-5-2","question":"\u2753 JWT 鉴权的接口怎么 Mock 用户身份？SSE 流式接口怎么测试的？","answer":"JWT 鉴权：测试类里先调 /user/login 获取 token，后续请求统一在 MockMvc 的 header 里带上 Authorization。或者用 @WithMockUser 注解 + 自定义 Security 配置模拟用户。SSE 测试：MockMvc.perform() 返回 MvcResult，用 .getAsyncResult() 等待异步结果，然后把响应体按行分割验证每行格式是否符合 \"data:xxx\" 的 SSE 规范。SseEmitter 在测试里会等 complete 后才返回，所以能完整拿到流式内容。","tags":["Mock\u9274\u6743","SSE\u6d4b\u8bd5"],"parentId":"root-5","order":1,"children":[]},
      {"id":"root-5-3","question":"\u2753 测试数据库为什么用 H2 而不是 MySQL？有没有遇到过行为不一致的情况？","answer":"H2 内存模式启动快、零配置、每次测试自动重建表结构（ddl-auto: create-drop）。当前还没遇到明显不一致\u2014\u2014因为 SQL 写得比较标准，没用到 MySQL 特有语法。但理论上风险存在：比如 MySQL 的 ON DUPLICATE KEY UPDATE 在 H2 里语法是 MERGE，如果用了就会失败。目前规避方式是 SQL 保持 ANSI 标准，需要时可切到 TestContainers 启动真实 MySQL 容器。","tags":["H2","\u6d4b\u8bd5\u6570\u636e\u5e93"],"parentId":"root-5","order":2,"children":[]}
    ]},
    {"id":"root-6","question":"\u2753 围绕项目的运维部署和项目管理，面试官可能会问哪些问题？","answer":"项目由我个人独立开发，周期约 3 个月（课余时间）。三个服务（前端 Vite、后端 Spring Boot、Python Agent）本地开发时分别启动，通过端口协调。没有做 Docker 化和 CI/CD，这也是后续提升的方向。","tags":["\u90e8\u7f72","\u73af\u5883\u7ba1\u7406","\u9879\u76ee\u7ba1\u7406"],"parentId":null,"order":5,"children":[
      {"id":"root-6-1","question":"\u2753 三个服务本地开发怎么同时启动？端口怎么协调？前端怎么代理后端？","answer":"三个终端分别启动：Agent 在 5000，Spring Boot 在 8080，Vite 在 5173。Vite 配置了 proxy：/api 转发到 localhost:8080，避免跨域。Spring Boot 调用 Agent 的地址配置在 application.yml 里。环境变量（DeepSeek API Key、数据库密码）用 .env 文件，.gitignore 排除了，防止泄露。","tags":["\u672c\u5730\u5f00\u53d1","\u4ee3\u7406\u914d\u7f6e"],"parentId":"root-6","order":0,"children":[
        {"id":"root-6-1-1","question":"\u2753 如果不用 Docker，部署到服务器上怎么做？怎么保证服务不挂？","answer":"可以分别打成 JAR（Spring Boot）、静态文件（Vite build 的 dist 给 Nginx）、Python 用 systemd 或 supervisor 守护进程。Nginx 反代 /api 到 8080，静态文件直接 serve。目前还没做，但方案是成熟的。稳定性方面：JVM 自带崩溃重启可通过 systemd 的 Restart=always；Python Agent 异常退出后 supervisor 自动拉起。没做健康检查和告警，对演示项目来说暂时不需要。","tags":["\u751f\u4ea7\u90e8\u7f72","\u8fdb\u7a0b\u5b88\u62a4"],"parentId":"root-6-1","order":0,"children":[]}
      ]},
      {"id":"root-6-2","question":"\u2753 这个项目你一个人做的？如果是团队项目你怎么分工的？开发周期多长？","answer":"个人独立开发，约 3 个月课余时间。前期 1 个月学 Spring Boot 和 Vue 3，边学边搭架子；后 2 个月实现功能。如果团队做，会按前后端分离：2 人前端（用户端+管理端各一个），1 人后端 Java，1 人 Agent/Python，我可能负责 Agent 和后端接口设计。最大的困难是三层流式对话管道的调试\u2014\u2014LLM 返回格式不确定、SSE 连接中断排查很花时间，最后靠加日志和单元测试一步步定位。","tags":["\u56e2\u961f\u534f\u4f5c","\u5f00\u53d1\u5468\u671f"],"parentId":"root-6","order":1,"children":[]}
    ]}
  ],"recycleBin":[]};
}

function saveToStorage(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  catch(e) { toast('localStorage 写入失败，请检查存储空间', 'error'); }
}

function loadFromStorage() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    var data = JSON.parse(raw);
    if (!data || !data.version || !data.trees) return null;
    if (!data.recycleBin) data.recycleBin = [];
    function fixNode(node) {
      if (!node.children) node.children = [];
      if (!node.id) node.id = generateId();
      node.children.forEach(fixNode);
    }
    data.trees.forEach(fixNode);
    return data;
  } catch(e) { toast('localStorage 数据损坏，已恢复默认数据', 'error'); return null; }
}

function findNodeById(trees, id) {
  for (var i = 0; i < trees.length; i++) {
    var found = findInTree(trees[i], id);
    if (found) return found;
  }
  return null;
}

function findInTree(node, id) {
  if (node.id === id) return node;
  if (!node.children) return null;
  for (var i = 0; i < node.children.length; i++) {
    var found = findInTree(node.children[i], id);
    if (found) return found;
  }
  return null;
}

function findParentInfo(trees, childId) {
  for (var i = 0; i < trees.length; i++) {
    var result = findParentInTree(trees[i], null, i, childId);
    if (result) return result;
  }
  return null;
}

function findParentInTree(node, parent, parentIndex, childId) {
  if (!node.children) return null;
  for (var i = 0; i < node.children.length; i++) {
    if (node.children[i].id === childId) return { parent: node, index: i, isRoot: !parent };
    var found = findParentInTree(node.children[i], node, i, childId);
    if (found) return found;
  }
  return null;
}

function buildNodePath(trees, nodeId) {
  var path = [];
  var current = findNodeById(trees, nodeId);
  while (current) {
    var q = current.question.replace(/^[^\u4e00-\u9fa5]*/, '');
    if (q.length > 20) q = q.substr(0, 20);
    path.unshift(q);
    var info = findParentInfo(trees, current.id);
    if (info && !info.isRoot) { current = info.parent; }
    else { break; }
  }
  return path.join(' \u2192 ');
}

function deepCloneNode(node) {
  var clone = {
    id: node.id, question: node.question, answer: node.answer,
    tags: node.tags ? node.tags.slice() : [], children: [],
    parentId: node.parentId, order: node.order
  };
  if (node.children) clone.children = node.children.map(deepCloneNode);
  return clone;
}

function deleteNode(nodeId) {
  if (isOperating) return;
  isOperating = true;
  var info = findParentInfo(treeData.trees, nodeId);
  if (!info) { isOperating = false; toast('节点未找到', 'error'); return; }
  if (info.isRoot) { isOperating = false; toast('根节点不可删除', 'warn'); return; }
  var deletedNode = info.parent.children[info.index];
  var snapshot = deepCloneNode(deletedNode);
  snapshot.originalParentId = info.parent.id;
  snapshot.originalIndex = info.index;
  snapshot.deletedAt = Date.now();
  snapshot._binId = generateId();
  snapshot._originalPath = buildNodePath(treeData.trees, nodeId);
  var childrenToMove = deletedNode.children ? deletedNode.children.slice() : [];
  childrenToMove.forEach(function(c) { c.parentId = info.parent.id; });
  var args = [info.index, 1].concat(childrenToMove);
  Array.prototype.splice.apply(info.parent.children, args);
  treeData.recycleBin.unshift(snapshot);
  saveToStorage(treeData);
  renderAll();
  isOperating = false;
  toast('已移入回收站');
}

function restoreNode(binIndex) {
  if (isOperating) return;
  isOperating = true;
  var item = treeData.recycleBin[binIndex];
  if (!item) { isOperating = false; return; }
  treeData.recycleBin.splice(binIndex, 1);
  var restoredNode = {
    id: item.id, question: item.question, answer: item.answer,
    tags: item.tags ? item.tags.slice() : [], children: item.children || [],
    parentId: null, order: 0
  };
  var originalParent = findNodeById(treeData.trees, item.originalParentId);
  if (originalParent) {
    restoredNode.parentId = originalParent.id;
    if (!originalParent.children) originalParent.children = [];
    var targetIndex = item.originalIndex;
    if (targetIndex >= 0 && targetIndex <= originalParent.children.length) {
      originalParent.children.splice(targetIndex, 0, restoredNode);
    } else {
      originalParent.children.push(restoredNode);
    }
  } else {
    restoredNode.parentId = null;
    restoredNode.order = treeData.trees.length;
    treeData.trees.push(restoredNode);
  }
  saveToStorage(treeData);
  renderAll();
  isOperating = false;
  toast('已恢复');
}

function toggleNode(nodeEl) {
  nodeEl.classList.toggle('expanded');
  var icon = nodeEl.querySelector(':scope > .node-header > .toggle-icon');
  if (icon) icon.classList.toggle('expanded');
}

function getDepthClass(depth) {
  if (depth <= 5) return 'depth-' + depth;
  return 'depth-5';
}

function renderNode(node, depth) {
  var depthClass = getDepthClass(depth);
  var hasChildren = node.children && node.children.length > 0;
  var isRootNode = (depth === 0);
  var div = document.createElement('div');
  div.className = 'node ' + depthClass;
  if (isRootNode) div.classList.add('node-root');
  div.setAttribute('data-id', node.id);
  div.setAttribute('data-depth', depth);
  var header = document.createElement('div');
  header.className = 'node-header';
  header.addEventListener('click', function(e) {
    if (e.target.closest('.delete-btn')) return;
    toggleNode(div);
  });
  var iconSpan = document.createElement('span');
  iconSpan.className = 'toggle-icon';
  iconSpan.textContent = '\u25b6';
  if (!isRootNode) { iconSpan.style.visibility = 'visible'; }
  else { iconSpan.style.visibility = 'hidden'; }
  header.appendChild(iconSpan);
  var qSpan = document.createElement('span');
  qSpan.className = 'question';
  qSpan.textContent = node.question;
  header.appendChild(qSpan);
  var delBtn = document.createElement('button');
  delBtn.className = 'delete-btn';
  delBtn.textContent = '\ud83d\uddd1\ufe0f 删除';
  if (isRootNode) { delBtn.classList.add('root-delete'); delBtn.title = '根节点不可删除'; }
  delBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (isRootNode) { toast('根节点不可删除', 'warn'); return; }
    deleteNode(node.id);
  });
  header.appendChild(delBtn);
  div.appendChild(header);
  var body = document.createElement('div');
  body.className = 'node-body';
  var answerDiv = document.createElement('div');
  answerDiv.className = 'answer';
  answerDiv.textContent = '\ud83d\udca1 ' + (node.answer || '');
  body.appendChild(answerDiv);
  if (node.tags && node.tags.length > 0) {
    var tagsDiv = document.createElement('div');
    tagsDiv.className = 'tags';
    node.tags.forEach(function(tag) {
      var tagSpan = document.createElement('span');
      tagSpan.className = 'tag';
      tagSpan.textContent = tag;
      tagsDiv.appendChild(tagSpan);
    });
    body.appendChild(tagsDiv);
  }
  div.appendChild(body);
  var childrenContainer = document.createElement('div');
  childrenContainer.className = 'children-container';
  if (hasChildren) {
    node.children.forEach(function(child) { childrenContainer.appendChild(renderNode(child, depth + 1)); });
  } else if (!isRootNode) {
    var emptyHint = document.createElement('div');
    emptyHint.className = 'children-empty';
    emptyHint.textContent = '\uff08暂无追问，可自行补充\uff09';
    childrenContainer.appendChild(emptyHint);
  }
  div.appendChild(childrenContainer);
  return div;
}

function renderAll() {
  var container = document.getElementById('trees-container');
  container.innerHTML = '';
  if (!treeData || !treeData.trees || treeData.trees.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:60px;color:#999;">\u6682\u65e0\u6570\u636e\uff0c\u8bf7\u70b9\u51fb\u53f3\u4e0a\u89d2\u201c\u91cd\u7f6e\u6570\u636e\u201d\u6062\u590d\u3002</div>';
    renderRecycleBin(); updateBinTrigger(); return;
  }
  treeData.trees.forEach(function(rootNode, index) {
    var treeRoot = document.createElement('div');
    treeRoot.className = 'tree-root';
    treeRoot.appendChild(renderNode(rootNode, 0));
    container.appendChild(treeRoot);
  });
  renderRecycleBin(); updateBinTrigger();
}

function renderRecycleBin() {
  var list = document.getElementById('recycle-list');
  var countEl = document.getElementById('bin-count');
  var bin = treeData.recycleBin || [];
  countEl.textContent = bin.length > 0 ? '(' + bin.length + ')' : '';
  if (bin.length === 0) { list.innerHTML = '<div class="recycle-empty">\ud83d\udced 暂无已删除的问题</div>'; return; }
  list.innerHTML = '';
  bin.forEach(function(item, index) {
    var itemDiv = document.createElement('div');
    itemDiv.className = 'recycle-item';
    var infoDiv = document.createElement('div');
    infoDiv.className = 'recycle-item-info';
    var qDiv = document.createElement('div');
    qDiv.className = 'recycle-item-question';
    var q = item.question.replace(/^[^\u4e00-\u9fa5]*/, '');
    qDiv.textContent = q.length > 20 ? q.substr(0, 20) + '...' : q;
    qDiv.title = item.question;
    infoDiv.appendChild(qDiv);
    var pathDiv = document.createElement('div');
    pathDiv.className = 'recycle-item-path';
    pathDiv.textContent = item._originalPath || '(\u8def\u5f84\u672a\u77e5)';
    infoDiv.appendChild(pathDiv);
    itemDiv.appendChild(infoDiv);
    var restoreBtn = document.createElement('button');
    restoreBtn.className = 'recycle-restore-btn';
    restoreBtn.textContent = '\u21a9\ufe0f 恢复';
    restoreBtn.addEventListener('click', function() { restoreNode(index); });
    itemDiv.appendChild(restoreBtn);
    list.appendChild(itemDiv);
  });
}

function updateBinTrigger() {
  var trigger = document.getElementById('bin-trigger');
  var bin = treeData.recycleBin || [];
  if (bin.length > 0) {
    trigger.classList.add('has-items');
    trigger.innerHTML = '\ud83d\udce5 回收站 <span class="badge">' + bin.length + '</span>';
  } else { trigger.classList.remove('has-items'); trigger.textContent = '\ud83d\udce5 回收站'; }
}

function toggleRecycleBin() {
  var panel = document.getElementById('recycle-panel');
  if (panel.classList.contains('open')) { closeRecycleBin(); }
  else { panel.classList.add('open'); document.getElementById('recycle-overlay').classList.add('show'); }
}

function closeRecycleBin() {
  document.getElementById('recycle-panel').classList.remove('open');
  document.getElementById('recycle-overlay').classList.remove('show');
}

function resetAll() {
  if (!confirm('确定要重置所有数据吗？这将清除所有删除/恢复操作记录，恢复为默认树结构。')) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  treeData = getDefaultData();
  saveToStorage(treeData);
  renderAll();
  closeRecycleBin();
  toast('数据已重置');
}

function init() {
  var stored = loadFromStorage();
  if (stored) { treeData = stored; }
  else { treeData = getDefaultData(); saveToStorage(treeData); }
  renderAll();
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeRecycleBin(); });
}

init();
</script>

</body>
</html>
